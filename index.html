<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Upload Tugas</title>
    <!-- Google Fonts untuk tampilan lebih profesional -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-body: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card { 
            background: #ffffff;
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }

        h2 { 
            margin: 0 0 10px 0;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        input, select { 
            width: 100%; 
            padding: 12px 16px; 
            margin: 0;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        input[type="file"] {
            background: #f1f5f9;
            border: 2px dashed var(--border-color);
            padding: 20px;
            cursor: pointer;
        }

        button { 
            width: 100%; 
            padding: 14px; 
            background-color: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 8px;
            cursor: pointer; 
            font-weight: 600;
            font-size: 16px;
            margin-top: 10px;
            transition: background-color 0.2s ease;
        }

        button:hover { 
            background-color: var(--primary-hover); 
        }

        button:disabled { 
            background-color: #cbd5e1;
            cursor: not-allowed;
        }

        #status { 
            text-align: center;
            font-size: 14px;
            margin-top: 15px;
            font-weight: 500;
        }

        .success { color: #059669; }
        .error { color: #dc2626; }
        .loading { color: var(--primary-color); }
    </style>
</head>
<body>

<div class="card">
    <h2 id="displayJudul">Portal Upload Tugas</h2>
    <p class="subtitle">Pastikan data yang Anda isi sudah benar sebelum mengirim.</p>
    
    <div class="form-group">
        <label for="namaTugas">Nama/Judul Tugas</label>
        <input type="text" id="namaTugas" placeholder="Contoh: Tugas Jaringan Dasar" required>
    </div>

    <div class="form-group">
        <label for="nama">Nama Lengkap Siswa</label>
        <input type="text" id="nama" placeholder="Masukkan nama lengkap Anda" required>
    </div>

    <div class="form-group">
        <label for="kelas">Kelas</label>
        <select id="kelas" required>
            <option value="" disabled selected>Pilih Kelas</option>
            <option value="10 TKJ">10 TKJ</option>
            <option value="11 TKJ">11 TKJ</option>
            <option value="12 TKJ">12 TKJ</option>
        </select>
    </div>
    
    <div class="form-group">
        <label for="fileInput">Pilih File Tugas</label>
        <input type="file" id="fileInput" required>
    </div>
    
    <button id="btnUpload" onclick="uploadData()">KIRIM TUGAS SEKARANG</button>
    <p id="status"></p>
</div>

<script>
    // Konfigurasi URL Script Google Anda
    const scriptURL = "https://script.google.com/macros/s/AKfycbyQGCMz0hmXF8DCkJ9Gt7ihMjdS4FUfzSQtU8doFUbNKmhbgzt5zkpnGEUz0PDV3PLe/exec"; 

    function uploadData() {
        const btn = document.getElementById('btnUpload');
        const namaTugas = document.getElementById('namaTugas').value;
        const nama = document.getElementById('nama').value;
        const kelas = document.getElementById('kelas').value;
        const fileInput = document.getElementById('fileInput').files[0];
        const status = document.getElementById('status');

        if (!namaTugas || !nama || !kelas || !fileInput) {
            return alert("Harap lengkapi semua data dan pilih file!");
        }

        btn.disabled = true;
        status.className = "loading";
        status.innerText = "⏳ Sedang mengirim berkas... Mohon tunggu.";

        const reader = new FileReader();
        reader.onload = function(e) {
            const base64Data = e.target.result.split(',')[1];
            
            // Mekanisme Rename sesuai permintaan: Nama_Kelas_Tugas
            const ext = fileInput.name.split('.').pop();
            const newFileName = `${nama}_${kelas}_${namaTugas}.${ext}`;

            const payload = {
                fileData: base64Data,
                filename: newFileName,
                mimeType: fileInput.type
            };

            fetch(scriptURL, {
                method: "POST",
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                alert("Berhasil! " + data.message);
                status.className = "success";
                status.innerText = "✅ File berhasil diunggah!";
                btn.disabled = false;
                // Reset form setelah sukses
                document.getElementById('fileInput').value = "";
            })
            .catch(err => {
                console.error(err);
                status.className = "error";
                status.innerText = "❌ Terjadi kesalahan! Silakan coba lagi.";
                alert("Terjadi kesalahan saat mengunggah.");
                btn.disabled = false;
            });
        };
        reader.readAsDataURL(fileInput);
    }
</script>

</body>
</html>
