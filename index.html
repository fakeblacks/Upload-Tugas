<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Upload Tugas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #e5e7eb;
            --text: #1e293b;
            --success: #10b981;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #e5e7eb;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Card Styling */
        .card { 
            background: #ffffff;
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
        }

        h2 { text-align: center; margin: 0 0 10px; font-weight: 700; }
        .subtitle { text-align: center; color: #64748b; font-size: 14px; margin-bottom: 30px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
        input, select { 
            width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 15px; box-sizing: border-box;
        }

        button { 
            width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; 
            font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        button:hover { background: var(--primary-hover); }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }

        /* --- MODAL STYLING --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex; align-items: center; justify-content: center;
            visibility: hidden; opacity: 0; transition: 0.3s; z-index: 1000;
        }
        .modal-overlay.active { visibility: visible; opacity: 1; }

        .modal {
            background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px;
            text-align: center; transform: translateY(-20px); transition: 0.3s;
        }
        .modal-overlay.active .modal { transform: translateY(0); }

        .icon-success {
            width: 60px; height: 60px; background: #ecfdf5; color: var(--success);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 30px; margin: 0 auto 20px;
        }

        .modal h3 { margin: 0 0 10px; color: var(--text); }
        .modal p { color: #64748b; font-size: 14px; line-height: 1.5; margin-bottom: 25px; }
        .file-name { font-weight: 600; color: var(--primary); word-break: break-all; }

        .btn-close {
            background: #f1f5f9; color: #475569; border: none; padding: 10px 25px;
            border-radius: 8px; font-weight: 600; cursor: pointer;
        }
        .btn-close:hover { background: #e2e8f0; }

        #status-msg { text-align: center; font-size: 14px; margin-top: 15px; color: var(--primary); }
    </style>
</head>
<body>

<div class="card">
    <h2>Portal Upload Tugas</h2>
    <p class="subtitle">Sistem Pengumpulan Tugas Otomatis</p>
    
    <div class="form-group">
        <label>Judul Tugas</label>
        <input type="text" id="namaTugas" placeholder="Contoh: Praktikum Jaringan" required>
    </div>

    <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" id="nama" placeholder="Masukkan nama sesuai absen" required>
    </div>

    <div class="form-group">
        <label>Kelas</label>
        <select id="kelas" required>
            <option value="" disabled selected>Pilih Kelas</option>
            <option value="10 TKJ">10 TKJ</option>
            <option value="11 TKJ">11 TKJ</option>
            <option value="12 TKJ">12 TKJ</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>Pilih File</label>
        <input type="file" id="fileInput" required>
    </div>
    
    <button id="btnUpload" onclick="uploadData()">KIRIM TUGAS SEKARANG</button>
    <p id="status-msg"></p>
</div>

<!-- CUSTOM MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="icon-success">✓</div>
        <h3>Pengiriman Berhasil!</h3>
        <p>File Anda telah tersimpan sebagai:<br>
           <span class="file-name" id="displayFileName"></span>
        </p>
        <button class="btn-close" onclick="closeModal()">Tutup</button>
    </div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbyQGCMz0hmXF8DCkJ9Gt7ihMjdS4FUfzSQtU8doFUbNKmhbgzt5zkpnGEUz0PDV3PLe/exec"; 

    function uploadData() {
        const btn = document.getElementById('btnUpload');
        const namaTugas = document.getElementById('namaTugas').value;
        const nama = document.getElementById('nama').value;
        const kelas = document.getElementById('kelas').value;
        const fileInput = document.getElementById('fileInput').files[0];
        const status = document.getElementById('status-msg');

        if (!namaTugas || !nama || !kelas || !fileInput) return alert("Lengkapi semua data!");

        btn.disabled = true;
        status.innerText = "⏳ Sedang mengunggah berkas...";

        const reader = new FileReader();
        reader.onload = function(e) {
            const ext = fileInput.name.split('.').pop();
            const newFileName = `${nama}_${kelas}_${namaTugas}.${ext}`;

            fetch(scriptURL, {
                method: "POST",
                body: JSON.stringify({
                    fileData: e.target.result.split(',')[1],
                    filename: newFileName,
                    mimeType: fileInput.type
                })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('displayFileName').innerText = newFileName;
                document.getElementById('modalOverlay').classList.add('active');
                status.innerText = "";
                btn.disabled = false;
                // Reset file input
                document.getElementById('fileInput').value = "";
            })
            .catch(err => {
                alert("Gagal mengunggah file.");
                btn.disabled = false;
                status.innerText = "";
            });
        };
        reader.readAsDataURL(fileInput);
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('active');
    }
</script>

</body>
</html>
